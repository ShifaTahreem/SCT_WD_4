<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow - To Do App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <div class="header">

        <h1>📝 TaskFlow</h1>

        <button id="themeBtn">
            🌙
        </button>

    </div>


    <p class="subtitle">
        Organize your daily tasks easily
    </p>



    <div class="task-input">


        <input 
        type="text"
        id="taskInput"
        placeholder="Enter your task">


        <input 
        type="date"
        id="dateInput">


        <input 
        type="time"
        id="timeInput">


        <button id="addBtn">
            Add Task
        </button>


    </div>




    <div class="stats">

        <span>
            Total:
            <b id="totalTasks">0</b>
        </span>


        <span>
            Completed:
            <b id="completedTasks">0</b>
        </span>


    </div>





    <ul id="taskList">

    </ul>




</div>



<script src="script.js"></script>


</body>

</html>
